[project]
name = "cascadia-obs-ensemble"
description = "Cascadia observational seismology ensemble processing pipeline"
version = "3.0.0"
channels = ["conda-forge", "pytorch"]
platforms = ["linux-64", "osx-arm64"]

# ── Core conda-forge dependencies ─────────────────────────────────────────────
[dependencies]
python = "3.10.*"
setuptools = ">=65"        # provides pkg_resources required by obspy
numpy = ">=1.22,<2"
pandas = ">=1.5"
scipy = ">=1.9"
matplotlib = ">=3.5"
obspy = ">=1.4"
h5py = ">=3.7"
basemap = ">=1.3.6"        # conda-forge only; used in utils/plot_utils.py
jupyter = ">=1.0"
ipykernel = ">=6.0"
ipython = ">=8.0"

# ── PyPI dependencies (public / default environment) ──────────────────────────
[pypi-dependencies]
seisbench = ">=0.4.0"
torch = ">=1.13.0"
dask = {version = ">=2022.10", extras = ["complete"]}
tqdm = ">=4.64"
openpyxl = ">=3.0"
adjustText = ">=0.8"
# ELEP: ML picker ensemble library (GitHub-only)
ELEP = {git = "https://github.com/congcy/ELEP.git"}

# ── Internal feature: UW pnwstore waveform archive ────────────────────────────
# Install with:  pixi install --environment internal
[feature.internal.pypi-dependencies]
pnwstore = {git = "https://github.com/niyiyu/pnwstore.git"}

# ── Environment definitions ────────────────────────────────────────────────────
[environments]
# default: public / EarthScope FDSN only — works anywhere
default = {solve-group = "default"}
# internal: adds pnwstore for UW waveform archive access
internal = {features = ["internal"], solve-group = "default"}

# ── Convenience tasks ─────────────────────────────────────────────────────────
[tasks]
verify = "python verify_environment.py"
notebook = "jupyter notebook"
pick = "python 1_picking/parallel_pick_2011.py"
